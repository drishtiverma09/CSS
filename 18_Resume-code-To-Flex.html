<html> 
<head> 
 <title>Resume Layout</title> 
  <style> 
    body { 
      font-family: Arial, sans-serif; 
      margin: 20px; 
    } 
    /* Flex layout for two-column resume */ 
    .resume-container { 
      display: flex; 
      gap: 20px; 
    } 
    .left, .right { 
      flex: 1; /* equal width */ 
      padding: 15px; 
      background: #f4f4f4; 
      border-radius: 8px; 
    } 
  </style> 
</head> 
<body> 
  <div class="resume-container"> 
   <div class="left"> 
      <h2>Education</h2> 
      <p> B.Tech in Computer Science - XYZ University</p> 
    </div> 
    <div class="right"> 
      <h2>Experience</h2> 
      <p>Software Engineer - ABC Corp</p> 
    </div> 
  </div> 
  
</body> 
</html>
