<html> 
<head> 
<title>Bootstrap - Alerts</title> 
<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootst
 rap.min.css" rel="stylesheet"> 
<script 
src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstra
 p.bundle.min.js"></script> 
</head> 
<body> 
<div class="container mt-3"> 
         <h4 class="fs-2">Examples of alert messages</h4> 
         <div class="alert alert-primary" role="alert"> 
             It is a primary alert box!         </div> 
         <div class="alert alert-secondary" role="alert"> 
             It is a secondary alert box!         </div> 
         <div class="alert alert-success" role="alert"> 
             It is a success alert box!         </div> 
         <div class="alert alert-danger" role="alert"> 
             It is a danger alert box!         </div> 
         <div class="alert alert-warning" role="alert"> 
             It is a warning alert box!         </div> 
         <div class="alert alert-info" role="alert"> 
             It is an info alert box!         </div> 
         <div class="alert alert-light" role="alert">             It 
is a light alert box!                </div> 
         <div class="alert alert-dark" role="alert"> 
             It is a dark alert box! 
         </div> 
     </div> 
 </body> 
</html>
