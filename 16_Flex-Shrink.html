<html> 
<head> 
   <style> 
   .flex-container { 
      display: flex; 
      background-color: lightgray; 
      width: 100%; 
   } 
   .flex-container div { 
      color: white; 
      background-color: #4CAF50; 
      padding: 5px; 
      margin: 5px; 
      height: 50px; 
      flex-basis: 100px; 
   } 
   .flex-item1 { 
      flex-shrink: 3;    } 
   .flex-item2 { 
      flex-shrink: 4.5;      } 
   </style> 
</head> 
<body> 
   <h2> 
   CSS flex-shrink property 
   </h2> 
   <h4> 
   flex-shrink: 3 (flex item2, flex item4),  
   4.5 (flex item6) 
   </h4> 
   <div class="flex-container"> 
   <div> 
      Flex item 1 
   </div> 
   <div class="flex-item1"> 
      Flex item 2 
   </div> 
   <div> 
      Flex item 3 
   </div> 
   <div class="flex-item1"> 
      Flex item 4 
   </div> 
   <div> 
      Flex item 5 
   </div> 
   <div class="flex-item2"> 
      Flex item 6 
   </div> 
   </div> 
</body> 
</html>
