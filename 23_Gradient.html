<html> 
<head> 
  <title>Gradient Example</title> 
  <style> 
 body { 
   font-family: Arial, sans-serif; 
   text-align: center; 
   padding: 20px; 
   background: #f4f4f4; 
 } 
 .box { 
   width: 250px; 
   height: 150px; 
   margin: 20px auto; 
   border-radius: 12px; 
   box-shadow: 0 4px 8px rgba(0,0,0,0.2); 
   color: white; 
   display: flex; 
   justify-content: center; 
   align-items: center; 
   font-weight: bold; 
 } 
 /* Linear Gradient Example */ 
 .linear { 
   background: linear-gradient(to right, #ff7e5f, #feb47b); 
 } 
 /* Radial Gradient Example */ 
 .radial { 
   background: radial-gradient(circle, #43cea2, #185a9d); 
 } 
 /* Conic Gradient Example */ 
 .conic { 
background: conic-gradient(from 0deg, red, yellow, green, blue, 
red); 
} 
</style> 
</head> 
<body> 
<h1>CSS Gradient Examples</h1> 
<div class="box linear">Linear Gradient</div> 
<div class="box radial">Radial Gradient</div> 
<div class="box conic">Conic Gradient</div> 
</body> 
</html>
