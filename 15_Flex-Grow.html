<html> 
<head> 
<style> 
.flex-container { 
display: flex; 
padding: 5px; 
background-color: lightgray; 
} 
.flex-container div { 
color: white; 
background-color: #4CAF50; 
padding: 10px; 
margin: 5px; 
} 
.flex-item1 { 
flex-grow: 1.5; 
} 
.flex-item2 { 
flex-grow: 3;   
} 
.flex-item3 { 
flex-grow: 2; 
} 
</style> 
</head> 
<body> 
<h2> 
CSS flex-grow property 
</h2> 
   <h4> 
   flex-grow: 1.5 (flex item1), 
   3 (flex item2), 2 (flex item3) 
   </h4> 
   <div class="flex-container"> 
   <div class="flex-item1"> 
      Flex item 1 
   </div> 
   <div class="flex-item2"> 
      Flex item 2 
   </div> 
   <div class="flex-item3"> 
      Flex item 3 
   </div> 
   </div> 

</body> 
</html>
